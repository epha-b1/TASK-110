services:
  api:
    build: .
    image: hospitality-ops-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: hospitality
      DB_PASSWORD: hospitality
      DB_NAME: hospitality
      # JWT_SECRET and ENCRYPTION_KEY are deliberately NOT hardcoded to
      # demo values. The application validates them at boot when
      # NODE_ENV=production and refuses to start with insecure or
      # default values (see src/config/environment.ts).
      #
      # For local development you can either:
      #   1) Run with NODE_ENV=development (the default if unset)
      #      → boot validation is bypassed; demo defaults are accepted
      #   2) Pass strong secrets via the host environment, e.g.
      #      JWT_SECRET=$(openssl rand -hex 32) \
      #      ENCRYPTION_KEY=$(openssl rand -hex 32) \
      #      docker compose up --build
      #
      # For production deployments, set both via your secret manager
      # (Docker secrets, k8s secrets, .env file, etc.) and require
      # NODE_ENV=production so the validator runs.
      JWT_SECRET: ${JWT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_TTL: "28800"
      PORT: "3000"
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./face-templates:/app/face-templates
    command: sh -c "npm run migrate && npm run seed && node dist/server.js"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  db:
    image: mysql:8
    # `--log-bin-trust-function-creators=1` is required so migration 017
    # (which creates the audit_logs immutability triggers) can run as
    # the non-SUPER `hospitality` user. MySQL 8 has binary logging
    # enabled by default; without this flag the trigger CREATE is
    # rejected with:
    #
    #   "You do not have the SUPER privilege and binary logging is
    #    enabled (you *might* want to use the less safe
    #    log_bin_trust_function_creators variable)"
    #
    # The flag is passed through docker-entrypoint.sh to mysqld as a
    # startup option, so it is active from the very first boot and
    # does not require a manual SET GLOBAL by a privileged user.
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: hospitality
      MYSQL_PASSWORD: hospitality
      MYSQL_DATABASE: hospitality
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hospitality", "-phospitality"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
